<div class="container d-flex justify-content-center align-items-center vh-100">
    <mat-card class="login-card shadow">
        <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
        <form (ngSubmit)="login()" class="d-flex flex-column gap-3" [formGroup]="form">
            <!-- EMAIL -->
            <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input matInput type="email" formControlName="email">
            </mat-form-field>

            <!-- PASSWORD -->
            <mat-form-field appearance="outline">
                <mat-label>Password</mat-label>
                <input matInput type="password" formControlName="password">
            </mat-form-field>

            <!-- ERROR -->
            <div *ngIf="error" class="text-danger small text-center">
                {{error}}
            </div>

            <!-- LOGIN BUTTON -->
            <button mat-raised-button color="primary" type="submit" [disabled]="loading">
                {{ loading ? 'Signing in...' : 'Login' }}
            </button>

        </form>

        <!-- Divider -->
        <div class="divider my-3">OR</div>

        <!-- GOOGLE LOGIN -->
        <button class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2"
            (click)="google()">

            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">

            Continue with Google
        </button>

        <!-- Signup link -->
        <div class="text-center mt-4">
            <span class="text-muted">Don’t have an account?</span>
            <a [routerLink]="['/signup']" href="javascript:void(0)">
                Sign up
            </a>


        </div>

    </mat-card>
</div>
